<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Investment Research Platform — Training Tracker</title>
<style>
  body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; margin: 0; padding: 40px; }
  .container { max-width: 800px; margin: 0 auto; }
  h1 { font-size: 24px; margin-bottom: 4px; }
  .subtitle { color: #94a3b8; margin-bottom: 30px; }
  .card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
  .bar-bg { background: #334155; border-radius: 8px; height: 14px; overflow: hidden; margin-top: 8px; }
  .bar-fill { background: #22c55e; height: 100%; transition: width 0.4s; }
  .row { display: flex; justify-content: space-between; margin-bottom: 6px; font-size: 14px; }
  .milestone { padding: 8px 0; border-bottom: 1px solid #334155; font-size: 14px; }
  .in_progress { color: #facc15; }
  .complete { color: #22c55e; }
  .upcoming { color: #64748b; }
  .error { color: #f87171; font-size: 13px; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>AI Investment Research Platform</h1>
  <div class="subtitle">Training Portal — v0.1</div>

  <div class="card">
    <div class="row"><span>Overall Progress</span><span id="pct">Loading...</span></div>
    <div class="bar-bg"><div class="bar-fill" id="bar" style="width:0%"></div></div>
  </div>

  <div class="card">
    <div class="row"><span>Current Week</span><span id="week">Loading...</span></div>
    <div class="row"><span>Current Lesson</span><span id="lesson">Loading...</span></div>
    <div class="row"><span>Estimated Time Remaining</span><span id="time">Loading...</span></div>
    <div class="row"><span>Next Task</span><span id="nexttask">Loading...</span></div>
    <div id="tracker-error" class="error"></div>
  </div>

  <div class="card">
    <h3>Milestones</h3>
    <div id="milestones"></div>
    <div id="milestone-error" class="error"></div>
  </div>
</div>

<script>
  // Load tracker data
  fetch('tracker.json?nocache=' + Date.now())
    .then(function(response) {
      if (!response.ok) throw new Error('HTTP error: ' + response.status);
      return response.json();
    })
    .then(function(data) {
      document.getElementById('pct').textContent = data.project_completion_percent + '%';
      document.getElementById('bar').style.width = data.project_completion_percent + '%';
      document.getElementById('week').textContent = 'Week ' + data.current_week + ' of ' + data.total_weeks;
      document.getElementById('lesson').textContent = data.current_lesson;
      document.getElementById('time').textContent = data.estimated_time_remaining_hours + ' hours';
      document.getElementById('nexttask').textContent = data.recommended_next_task;
    })
    .catch(function(error) {
      document.getElementById('tracker-error').textContent = 'Error loading tracker.json: ' + error.message;
    });

  // Load milestones data
  fetch('milestones.json?nocache=' + Date.now())
    .then(function(response) {
      if (!response.ok) throw new Error('HTTP error: ' + response.status);
      return response.json();
    })
    .then(function(list) {
      var container = document.getElementById('milestones');
      list.forEach(function(m) {
        var div = document.createElement('div');
        div.className = 'milestone';
        div.innerHTML = 'Week ' + m.week + ': ' + m.title + ' — <span class="' + m.status + '">' + m.status.replace('_', ' ') + '</span>';
        container.appendChild(div);
      });
    })
    .catch(function(error) {
      document.getElementById('milestone-error').textContent = 'Error loading milestones.json: ' + error.message;
    });
</script>
</body>
</html>
